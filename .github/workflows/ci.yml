name: Build, test and package

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore dependencies
        run: dotnet restore ProductsApi.slnx

      - name: Run tests
        run: dotnet test ProductsApi.slnx --no-restore --logger "console;verbosity=minimal"

      - name: Extract application version
        id: version
        run: |
          VERSION=$(python - <<'PY'
          import xml.etree.ElementTree as ET
          tree = ET.parse('Products.Api/Products.Api.csproj')
          root = tree.getroot()
          version = root.findtext('.//Version')
          print(version or '1.0.0')
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release tag from version
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          TAG="v${{ steps.version.outputs.version }}"
          if ! git rev-parse "$TAG" >/dev/null 2>&1; then
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Build local container image
        run: |
          mkdir -p artifacts
          docker buildx build --platform linux/amd64 -t products-api:${{ github.sha }} --load .

      - name: Scan container image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: products-api:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Export OCI image layout
        run: |
          mkdir -p artifacts
          docker buildx build --platform linux/amd64 -t products-api:${{ steps.version.outputs.version }} --output type=oci,dest=./artifacts/products-api-${{ steps.version.outputs.version }}.oci .
          tar -czf ./artifacts/products-api-${{ steps.version.outputs.version }}.oci.tar.gz ./artifacts/products-api-${{ steps.version.outputs.version }}.oci

      - name: Upload container artifacts
        uses: actions/upload-artifact@v4
        with:
          name: products-container-artifacts
          path: artifacts/*
